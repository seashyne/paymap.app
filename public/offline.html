<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PayMap Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f3f5f9; color: #0f172a; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(92vw, 560px); border: 1px solid rgba(15, 23, 42, .1); background: white; border-radius: 18px; padding: 28px; box-shadow: 0 18px 48px rgba(15, 23, 42, .08); }
      h1 { margin: 0; font-size: 28px; }
      p { color: #475569; line-height: 1.7; }
      a { color: #5b47d3; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <h1>PayMap is offline</h1>
      <p>Cached pages can still open. Your local financial data stays on this device by default. Reconnect to use login, Cloud Backup, or sync features.</p>
      <a href="/dashboard">Try dashboard again</a>
    </main>
  </body>
</html>
